<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! - Sirjan Nishad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-primary: #00d4ff;
            --accent-secondary: #ff80ed;
            --card-bg: #161b22;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        .thank-you-container {
            position: relative;
            z-index: 10;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            background-color: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            opacity: 0;
            animation: fadeInScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes fadeInScale {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
            }
            70% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .icon-container svg {
            width: 100%;
            height: 100%;
            color: var(--accent-primary);
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeIn 1s 0.5s forwards;
        }

        p {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            margin-bottom: 2rem;
            line-height: 1.6;
            opacity: 0;
            animation: fadeIn 1s 0.7s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .back-link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: var(--accent-primary);
            color: var(--bg-color);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s 0.9s forwards, pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4);
            }
            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(0, 212, 255, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 212, 255, 0);
            }
        }

        .back-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        /* Gradient Background Animation */
        .gradient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: linear-gradient(-45deg, var(--accent-primary), var(--accent-secondary), var(--bg-color), var(--card-bg));
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
        }

        @keyframes gradientAnimation {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        .social-links {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            opacity: 0;
            animation: fadeIn 1s 1.1s forwards;
        }

        .social-link {
            color: var(--text-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .social-link svg {
            width: 24px;
            height: 24px;
            transition: transform 0.3s ease;
        }
        
        .social-link:hover svg {
            transform: translateY(-3px);
            color: var(--accent-primary);
        }
        
        /* Confetti Canvas */
        .confetti {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Animated Gradient Background -->
    <div class="gradient-bg"></div>
    
    <!-- Confetti Canvas -->
    <canvas id="confetti" class="confetti"></canvas>

    <div class="thank-you-container">
        <!-- Success Icon -->
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
            </svg>
        </div>

        <h1>Thank You for Your Message!</h1>
        <p>Your message has been successfully sent. I will get back to you as soon as possible.</p>
        
        <a href="index.html" class="back-link">Return to Home</a>
        
        <div class="social-links">
            <a href="https://www.linkedin.com/in/sirjan-nishad-2aa883288/" class="social-link" aria-label="LinkedIn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.761 0-.971.784-1.75 1.75-1.75s1.75.779 1.75 1.75c0 .971-.784 1.761-1.75 1.761zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            </a>
            <a href="https://github.com/Sirjan-74" class="social-link" aria-label="GitHub">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.809 1.305 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.465-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.046.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.772.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.802.576 4.765-1.589 8.197-6.094 8.197-11.387 0-6.627-5.373-12-12-12z"/></svg>
            </a>
        </div>
    </div>
    
    <script>
        // Confetti effect
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let confetti = [];
        const colors = ['#00d4ff', '#ff80ed', '#fff', '#c9d1d9'];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: -Math.random() * canvas.height,
                    size: Math.random() * 5 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: Math.random() * 2 + 1,
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 10 - 5
                });
            }
        }

        function drawConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confetti.forEach(c => {
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.rotate(c.rotation * Math.PI / 180);
                ctx.fillStyle = c.color;
                ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size);
                ctx.restore();
            });
        }

        function updateConfetti() {
            for (let i = 0; i < confetti.length; i++) {
                let c = confetti[i];
                c.y += c.speed;
                c.rotation += c.rotationSpeed;
                if (c.y > canvas.height) {
                    c.y = -c.size;
                    c.x = Math.random() * canvas.width;
                }
            }
        }

        function animateConfetti() {
            updateConfetti();
            drawConfetti();
            requestAnimationFrame(animateConfetti);
        }

        window.onload = function() {
            resizeCanvas();
            createConfetti();
            animateConfetti();
        };

        window.addEventListener('resize', resizeCanvas);
    </script>

</body>
</html>
